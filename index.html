<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">freeCodeCamp Survey Form</h1>
    <p id="description">Thank you for taking the time to help us improve the platform.</p>
    <form id="survey-form">
      <div>
      <label id="name-label" for="name">Name</label>
      <input required type="text" id="name" name="name" placeholder="Enter your name">
      <br>
      <label id="email-label" for="email">Email</label>
      <input required type="email" id="email" name="email" placeholder="Enter your Email" minlength="4">
      <br>
      <label id="number-label" for="number">Age (optional)</label>
      <input type="number" id="number" name="number" min="10" max="99" placeholder="18">
      </div>
      <div>
      <label id="dropdown-label" for="dropdown">Which option best describes your current role?</label>
      <select id="dropdown" name="dropdown" required>
        <option value="Select-current-role" disabled selected>Select Current Role</option>
        <option value="Student">Student</option>
        <option value="Full-time-job">Full Time Job</option>
        <option value="Full-time-learner">Full Time Learner</option>
        <option value="Prefer-not-to say">Prefer not to Say</option>
        <option value="Other">Other</option>
      </select>
      </div>
      <div>
      <p>Would you recommend freeCodeCamp to a friend?</p>
      <input type="radio" id="definitely" name="recommend" value="definitely" checked>
      <label for="recommend">Definitely</label>
      <input type="radio" id="maybe" name="recommend" value="maybe">
      <label for="recommend">Maybe</label>
      <input type="radio" id="not-sure" name="recommend" value="not-sure">
      <label for="recommend">Not sure</label> 
      </div>
      <!--<div>
      <label for="feature" id="second-dropdown">What is your favorite feature of freeCodeCamp?</label>
      <select id="feature" name="feature">
        <option value="select-an-option" disabled selected>Select an option</option>
        <option value="challenges">Challenges</option>
        <option value="projects">Projects</option>
        <option value="community">Community</option>
        <option value="open-source">Open Source</option>
      </select>
      </div>-->
      <div>
      <p>What would you like to see improved? (Check all that apply)</p>
      <input type="checkbox" id="front-end" name="improved" value="front-end">
      <label for="front-end">Front-end Projects</label>
      <input type="checkbox" id="back-end" name="improved" value="back-end">
      <label for="back-end">Back-end Projects</label>
      <input type="checkbox" id="data-visualization" name="improved" value="data-visualization">
      <label for="data-visualization">Data Visualization</label>
      <input type="checkbox" id="challenges2" name="improved" value="challenges2">
      <label for="challenges2">Challenges</label>
      <input type="checkbox" id="open-source-community" name="improved" value="open-source-community">
      <label for="open-source-community">Open Source Community</label>
      <input type="checkbox" id="gitter-help-rooms" name="improved" value="gitter-help-rooms">
      <label for="gitter-help-rooms">Gitter help rooms</label>
      <input type="checkbox" id="videos" name="improved" value="videos">
      <label for="videos">Videos</label>
      <input type="checkbox" id="city-meetings" name="improved" value="city-meetings">
      <label for="city-meetings">City Meetings</label>
      <input type="checkbox" id="wiki" name="improved" value="wiki">
      <label for="wiki">Wiki</label>
      <input type="checkbox" id="forum" name="improved" value="forum">
      <label for="forum">Forum</label>
      <input type="checkbox" id="additional-courses" name="improved" value="additional-courses">
      <label for="additional-courses">Additional Courses</label>
      </div>
      <div>
      <label for="comments">Any comments or suggestions?</label>
      <textarea id="comments" name="comments" placeholder="Enter your comments here..."></textarea>
      </div>
      <button type="submit" id="submit" value="submit">
    </form>
  </body>
</html>
